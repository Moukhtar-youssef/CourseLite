services:
  postgres:
    image: postgres:16-alpine
    container_name: courselite_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: courselite
      POSTGRES_PASSWORD: courselite
      POSTGRES_DB: courselite
    ports:
      - "5432:5432" # exposes DB to your local machine
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./sql/schema.sql:/docker-entrypoint-initdb.d/schema.sql # auto-runs on first start
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U courselite"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
