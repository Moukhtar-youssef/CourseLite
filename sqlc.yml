version: "2"
sql:
  - engine: "postgresql"
    queries: "./sql/query.sql"
    schema: "./sql/schema.sql"
    gen:
      go:
        package: DB
        out: internal/db
        sql_package: "pgx/v5"
        overrides:
          - db_type: "uuid"
            go_type:
              import: "github.com/google/uuid"
              type: "UUID"
          - db_type: "timestamptz"
            go_type:
              import: "time"
              type: "Time"
