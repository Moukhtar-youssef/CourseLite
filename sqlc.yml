version: "2"
sql:
  - engine: "postgresql"
    queries: "./sql/queries"
    schema: "./sql/schema.sql"
    gen:
      go:
        package: DB
        out: internal/db
        sql_package: "pgx/v5"
        emit_json_tags: true
        emit_pointers_for_null_types: true
        overrides:
          - db_type: "uuid"
            go_type:
              import: "github.com/google/uuid"
              type: "UUID"
          - db_type: "timestamptz"
            go_type:
              import: "time"
              type: "Time"
          - db_type: "text"
            go_type:
              type: "string"
